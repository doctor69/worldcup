<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgBlue" cx="18%" cy="18%" r="55%" gradientUnits="userSpaceOnUse"
      x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#0d2a5c" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#070B14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgRed" cx="82%" cy="82%" r="55%" gradientUnits="userSpaceOnUse"
      x1="0" y1="0" x2="1200" y2="630">
      <stop offset="0%" stop-color="#4a1010" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#070B14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%" gradientUnits="userSpaceOnUse"
      cx="600" cy="315" r="420">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="#070B14"/>
  <rect width="1200" height="630" fill="url(#bgBlue)"/>
  <rect width="1200" height="630" fill="url(#bgRed)"/>
  <ellipse cx="600" cy="315" rx="560" ry="300" fill="url(#glow)"/>

  <!-- Outer frame -->
  <rect x="18" y="18" width="1164" height="594" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.18"/>

  <!-- Corner ornaments - top left -->
  <polyline points="18,64 18,18 64,18" fill="none" stroke="#FFD700" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <!-- Corner ornaments - top right -->
  <polyline points="1136,18 1182,18 1182,64" fill="none" stroke="#FFD700" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <!-- Corner ornaments - bottom left -->
  <polyline points="18,566 18,612 64,612" fill="none" stroke="#FFD700" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>
  <!-- Corner ornaments - bottom right -->
  <polyline points="1136,612 1182,612 1182,566" fill="none" stroke="#FFD700" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>

  <!-- Trophy shape -->
  <!-- Bowl -->
  <path d="M 556 78 C 554 58 646 58 644 78 L 636 148 Q 600 162 564 148 Z"
        fill="#B8860B" opacity="0.85"/>
  <path d="M 558 80 C 556 62 644 62 642 80 L 634 146 Q 600 160 566 146 Z"
