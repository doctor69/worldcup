  <!-- Left handle -->
  <path d="M 558 92 Q 520 92 520 122 Q 520 152 558 152" fill="none"
        stroke="#FFD700" stroke-width="7" stroke-linecap="round" opacity="0.75"/>
  <!-- Right handle -->
  <path d="M 642 92 Q 680 92 680 122 Q 680 152 642 152" fill="none"
        stroke="#FFD700" stroke-width="7" stroke-linecap="round" opacity="0.75"/>
  <!-- Stem -->
  <rect x="592" y="148" width="16" height="36" fill="#FFD700" opacity="0.7" rx="2"/>
  <!-- Base plate -->
  <rect x="566" y="184" width="68" height="11" fill="#FFD700" opacity="0.65" rx="3"/>
  <rect x="554" y="195" width="92" height="9" fill="#FFD700" opacity="0.5" rx="3"/>

  <!-- Top eyebrow label -->
  <text x="600" y="268"
    text-anchor="middle"
    font-family="Liberation Sans, Arial, Helvetica, sans-serif"
    font-size="13"
    letter-spacing="7"
    fill="#FFD700"
    opacity="0.55">MONTE CARLO ANALYSIS  ·  1,000 SIMULATIONS</text>

  <!-- Hairline separator -->
  <line x1="420" y1="282" x2="780" y2="282" stroke="#FFD700" stroke-width="0.5" opacity="0.2"/>

  <!-- Main title -->
  <text x="600" y="368"
    text-anchor="middle"
    font-family="Liberation Serif, Georgia, 'Times New Roman', serif"
    font-size="76"
    font-weight="400"
    letter-spacing="0"
    fill="#FFD700">FIFA World Cup 2026&#x2122;</text>

  <!-- Hairline separator below title -->
  <line x1="220" y1="392" x2="980" y2="392" stroke="#FFD700" stroke-width="0.5" opacity="0.2"/>

  <!-- Subtitle -->
  <text x="600" y="448"
