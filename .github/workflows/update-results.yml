name: Update Match Results

# Runs every 3 hours and can be triggered manually from the Actions tab.
# No API key required — uses ESPN's public scoreboard API.

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Fetch latest results
        run: node .github/scripts/fetch-results.mjs

      - name: Commit and push if results changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet public/results.json || (
            git add public/results.json &&
            git commit -m "chore: update match results $(date -u +%Y-%m-%dT%H:%M:%SZ)" &&
            git push origin main
          )
