name: Update Match Results

# Runs every 3 hours and can be triggered manually from the Actions tab.
# No API key required — uses ESPN's public scoreboard API.
#
# When scores change, this workflow commits the new results.json AND
# immediately rebuilds and redeploys the site. A separate push-triggered
# deploy is not used because GitHub's GITHUB_TOKEN cannot trigger
# downstream workflow runs (by design, to prevent infinite loops).

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Fetch latest results
        id: fetch
        run: |
          node .github/scripts/fetch-results.mjs
          if git diff --quiet public/results.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No score changes — skipping deploy."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Scores updated — will rebuild and deploy."
          fi

      - name: Commit updated results
        if: steps.fetch.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/results.json
          git commit -m "chore: update match results $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin main

      - name: Install font + SVG renderer
        if: steps.fetch.outputs.changed == 'true'
        run: sudo apt-get install -y librsvg2-bin fonts-liberation

      - name: Generate OG image PNG from SVG
        if: steps.fetch.outputs.changed == 'true'
        run: rsvg-convert -w 1200 -h 630 public/og-image.svg -o public/og-image.png

      - name: Install dependencies
        if: steps.fetch.outputs.changed == 'true'
        run: npm ci

      - name: Build site
        if: steps.fetch.outputs.changed == 'true'
        run: npm run build

      - name: Upload Pages artifact
        if: steps.fetch.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        if: steps.fetch.outputs.changed == 'true'
        id: deploy
        uses: actions/deploy-pages@v4
